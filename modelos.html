<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelos de Documentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4361ee;
      --secondary-color: #3f37c9;
      --accent-color: #4cc9f0;
      --light-color: #f8f9fa;
      --dark-color: #212529;
      --card-bg: #ffffff;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: var(--dark-color);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .back-btn:hover {
      background: var(--secondary-color);
      transform: translateY(-50%) scale(1.05);
    }

    h1 {
      font-weight: 700;
      color: var(--primary-color);
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .search-bar {
      margin-bottom: 40px;
      position: relative;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .search-input {
      padding: 12px 20px;
      padding-left: 45px;
      border-radius: 50px;
      border: 2px solid #e9ecef;
      width: 100%;
      font-size: 16px;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    .search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
    }

    .modelo-card {
      background: var(--card-bg);
      border: none;
      border-radius: 12px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: var(--transition);
      box-shadow: var(--shadow);
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .modelo-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary-color), var(--accent-color));
      transition: var(--transition);
    }

    .modelo-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .modelo-card:hover::before {
      width: 8px;
    }

    .modelo-card i {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: var(--transition);
    }

    .modelo-card:hover i {
      transform: scale(1.1);
    }

    .modelo-content {
      flex: 1;
    }

    .modelo-titulo {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 5px 0;
      color: var(--dark-color);
    }

    .modelo-desc {
      font-size: 0.9rem;
      color: #6c757d;
      margin: 0;
    }

    .btn-download {
      margin-left: auto;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 14px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: var(--shadow);
    }

    .btn-download:hover {
      background: var(--secondary-color);
      transform: scale(1.05);
    }

    .hidden {
      display: none !important;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #6c757d;
      display: none;
    }

    .no-results i {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #dee2e6;
    }

    @media (max-width: 768px) {
      .back-btn {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        margin-bottom: 20px;
      }
      
      .header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      
      h1 {
        align-self: center;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i> Voltar
      </button>
      <h1>
        <i class="fas fa-file-alt"></i> Modelos de Documentos
      </h1>
    </div>

    <div class="search-bar">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar modelo...">
    </div>

    <div class="no-results" id="noResults">
      <i class="fas fa-file-excel"></i>
      <h3>Nenhum modelo encontrado</h3>
      <p>Tente usar termos diferentes na sua busca</p>
    </div>
<div class="row g-4" id="modelosContainer">
  <!-- Os cards são carregados dinamicamente via Google Sheets -->
</div>

    <div id="loadingMsg" style="text-align:center; padding: 40px; color: #6c757d;">
      <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:12px; display:block;"></i>
      Carregando modelos...
    </div>

    <div id="errorMsg" style="display:none; text-align:center; padding:40px; color:#dc3545;">
      <i class="fas fa-exclamation-triangle" style="font-size:2rem; margin-bottom:12px; display:block;"></i>
      <strong>Erro ao carregar os modelos.</strong><br>
      Verifique se a planilha está publicada corretamente.
    </div>
    </div>
  </div>

<script>
  // ============================================================
  // CONFIGURAÇÃO: cole aqui a URL do Apps Script implantado
  // Extensões > Apps Script > Implantar > Aplicativo da Web
  // Acesso: "Qualquer pessoa" → copiar URL do exec
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnSEAqiixtMKnBb8XUc2_prWzrBrhKhAeouTYB7KptRcCrPLnA3S150zlKunjQCoAa1w/exec';
  // ============================================================

  const container = document.getElementById('modelosContainer');
  const noResults = document.getElementById('noResults');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorMsg = document.getElementById('errorMsg');
  const searchInput = document.getElementById('searchInput');

  function renderCards(modelos) {
    container.innerHTML = modelos.map(({ titulo, link }) => `
      <div class="col-md-6 col-lg-4 modelo-item">
        <div class="modelo-card">
          <i class="fas fa-file-alt"></i>
          <div class="modelo-content">
            <h3 class="modelo-titulo">${titulo}</h3>
          </div>
          <a href="${link}" class="btn btn-download" download>
            <i class="fas fa-download"></i> Baixar
          </a>
        </div>
      </div>
    `).join('');
  }

  function applySearch() {
    const search = searchInput.value.toLowerCase();
    const items = container.querySelectorAll('.modelo-item');
    let hasVisible = false;
    items.forEach(item => {
      const titulo = item.querySelector('.modelo-titulo').textContent.toLowerCase();
      const visible = titulo.includes(search);
      item.classList.toggle('hidden', !visible);
      if (visible) hasVisible = true;
    });
    noResults.style.display = hasVisible ? 'none' : 'block';
  }

  const CACHE_KEY = 'modelos_cache';
  const CACHE_TTL = 60 * 60 * 1000; // 1 hora em ms

  function getCached() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }

  function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }

  async function fetchRemoto() {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('Resposta inválida');
    return res.json();
  }

  async function carregarModelos() {
    const cached = getCached();

    if (cached) {
      // Carrega do cache instantaneamente
      loadingMsg.style.display = 'none';
      renderCards(cached);
      searchInput.addEventListener('input', applySearch);
      // Atualiza cache em background silenciosamente
      fetchRemoto().then(modelos => {
        saveCache(modelos);
        renderCards(modelos);
      }).catch(() => {});
      return;
    }

    // Primeira visita: busca da fonte
    try {
      const modelos = await fetchRemoto();
      saveCache(modelos);
      loadingMsg.style.display = 'none';
      renderCards(modelos);
      searchInput.addEventListener('input', applySearch);
    } catch (e) {
      loadingMsg.style.display = 'none';
      errorMsg.style.display = 'block';
    }
  }

  carregarModelos();
</script>

</body>
</html>
